{% extends 'base.html' %}
{% block content %}
<div style="min-height:70vh; display:flex; align-items:center; justify-content:center; padding:48px 16px;">
  <div style="width:100%; max-width:420px;">
    <div class="page-card" style="padding:36px 32px;">
      <div style="text-align:center; margin-bottom:24px;">
        <div style="font-size:2.5rem; margin-bottom:12px;">🔐</div>
        <h2 style="margin:0 0 4px; font-size:1.4rem; font-weight:800;">Forgot Password</h2>
        <p style="margin:0; color:var(--muted); font-size:0.88rem;">Enter your email and we'll send a reset code.</p>
      </div>
      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="input-group">
          <label class="field-label">Email Address</label>
          <input type="email" name="email" class="input-field" placeholder="you@example.com" required>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn" style="width:100%; padding:14px; border-radius:999px; font-size:1rem;">Send Reset Code</button>
        </div>
      </form>
      <p class="footer-note" style="margin-top:20px;">
        Remember your password? <a href="{{ url_for('login') }}" style="color:#F59E0B; font-weight:600;">Sign in</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
