{% extends 'base.html' %}
{% block content %}
<div style="min-height:70vh; display:flex; align-items:center; justify-content:center; padding:48px 16px;">
  <div style="width:100%; max-width:420px;">
    <div class="page-card" style="padding:36px 32px;">
      <div style="text-align:center; margin-bottom:24px;">
        <div style="font-size:2.5rem; margin-bottom:12px;">🔑</div>
        <h2 style="margin:0 0 4px; font-size:1.4rem; font-weight:800;">Reset Password</h2>
        <p style="margin:0; color:var(--muted); font-size:0.88rem;">Enter the code sent to <strong>{{ email }}</strong></p>
      </div>
      <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="email" value="{{ email }}">
        <div class="input-group">
          <label class="field-label">Reset Code</label>
          <input type="text" name="otp" class="input-field" placeholder="6-digit code" maxlength="6"
            inputmode="numeric" required style="letter-spacing:0.2em; font-size:1.2rem; text-align:center;">
        </div>
        <div class="input-group">
          <label class="field-label">New Password</label>
          <input type="password" name="password" class="input-field" placeholder="Min. 6 characters" required>
        </div>
        <div class="input-group">
          <label class="field-label">Confirm Password</label>
          <input type="password" name="confirm_password" class="input-field" placeholder="Repeat password" required>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn" style="width:100%; padding:14px; border-radius:999px; font-size:1rem;">Reset Password</button>
        </div>
      </form>
      <p class="footer-note" style="margin-top:20px;">
        <a href="{{ url_for('forgot_password') }}" style="color:#F59E0B; font-weight:600;">Resend code</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
