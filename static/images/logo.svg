<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="shoeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#374151"/>
    </linearGradient>
    <linearGradient id="soleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B"/>
      <stop offset="100%" style="stop-color:#FBBF24"/>
    </linearGradient>
  </defs>

  <!-- Shoe icon box -->
  <rect x="2" y="2" width="52" height="52" rx="12" fill="#111827"/>

  <!-- Shoe body -->
  <path d="M10 38 C10 38 12 28 20 26 C26 24 30 26 34 24 C38 22 40 20 42 22 C44 24 44 28 40 30 C36 32 32 30 28 32 C24 34 22 38 22 38 Z"
    fill="white" opacity="0.95"/>

  <!-- Shoe sole -->
  <path d="M10 38 L42 38 C44 38 46 39 46 40.5 C46 42 44 43 42 43 L12 43 C10 43 8 42 8 40.5 C8 39 9 38 10 38 Z"
    fill="url(#soleGrad)"/>

  <!-- Laces -->
  <line x1="22" y1="29" x2="26" y2="27" stroke="#111827" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="26" y1="31" x2="30" y2="29" stroke="#111827" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="30" y1="30" x2="34" y2="28" stroke="#111827" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Star accent -->
  <circle cx="44" cy="12" r="4" fill="#F59E0B"/>
  <text x="44" y="15.5" text-anchor="middle" font-size="6" fill="white" font-weight="bold">★</text>

  <!-- Brand name -->
  <text x="62" y="24" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="900" fill="#111827" letter-spacing="-0.5">The Dream Shoe</text>

  <!-- Divider line -->
  <line x1="62" y1="30" x2="196" y2="30" stroke="#F59E0B" stroke-width="1.5"/>

  <!-- Tagline -->
  <text x="62" y="44" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="600" fill="#6B7280" letter-spacing="2">BARILI</text>
</svg>
